<html>
{% load static %}
<link rel="stylesheet" href="{% static 'css/color_palette_original.css' %}">
<head>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.0/css/bootstrap.min.css">
<!-- jQuery library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Latest compiled JavaScript -->
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.0/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
  body {
      background-color: #F4F4F9;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
  }

  .main-wrapper {
      flex: 1 0 auto;
  }

  /* Social section */
  footer {
    padding: 0px 0px 0px 0px;
    background-color: #2F4550;
    margin: 0px;
    flex-shrink: 0;
  }

  #ftr {
    padding: 20px;
  }

  .fa {
    font-size: 23px;
    width: 60px;
    text-align: center;
    text-decoration: none;
    margin: 5px 2px;
    border-radius: 50%;
  }

  .fa:hover {
    opacity: 0.5;
    text-decoration: none;
  }

  .fa-facebook { background: #3B5998; color: white; margin-top: 30px; }
  .fa-whatsapp { background: #25d366; color: white; }
  .fa-twitter { background: #55ACEE; color: white; }
  .fa-instagram { background: #125688; color: white; }

  p { text-align: center; }
</style>

</head>
<body>
<div class="main-wrapper">
{% include "ecom/customer_navbar.html" %}

{% if messages %}
    <script>
        $(document).ready(function() {
            {% for message in messages %}
                Swal.fire({
                    title: "{{ message.tags|capfirst }}!",
                    text: "{{ message }}",
                    icon: "{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% else %}info{% endif %}",
                    confirmButtonColor: '#2F4550',
                    timer: 2500,
                    position: 'center'
                });
            {% endfor %}
        });
    </script>
{% endif %}

<!-- content start-->
{% block content %}

{% endblock content %}
<!-- content end-->
</div>
<footer>
  <p>
    <a id="ftr" href="#" class="fa fa-facebook"></a>
    <a id="ftr" href="#" class="fa fa-whatsapp"></a>
    <a id="ftr" href="#" class="fa fa-instagram"></a>
    <a id="ftr" href="#" class="fa fa-twitter"></a>
  </p>

  <br>
  <div class="container">
    <div class="row">
      <div class="col-md-12 col-sm-12">
        <div style="color:#ffffff;" class="wow fadeInUp footer-copyright">
          <p>Made in India <br>
            Copyright &copy; 2020 Ecommerce </p>
        </div>
      </div>
    </div>
  </div>
</footer>
{% block scripts %}
{% endblock %}
<script>
$(document).ready(function(){

function openNav() {
document.getElementById("mySidenav").style.width = "70%";

document.body.style.backgroundColor = "rgba(0,0,0,0.4)";
}

function closeNav() {
document.getElementById("mySidenav").style.width = "0";
document.body.style.backgroundColor = "rgba(0,0,0,0)";
}


});
</script>

</body>
</html>
