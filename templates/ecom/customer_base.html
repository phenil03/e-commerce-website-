<html>
{% load static %}
<head>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.0/css/bootstrap.min.css">
<!-- jQuery library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Latest compiled JavaScript -->
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.0/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
  body {
      background-color: #F4F4F9;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
  }

  .main-wrapper {
      flex: 1 0 auto;
  }

  p { text-align: center; }

  /* Remove default focus outlines/boxes from clickable elements */
  *:focus {
      outline: none !important;
  }
  a:focus, button:focus, .btn:focus, .nav-link-item:focus {
      outline: none !important;
      box-shadow: none !important;
      text-decoration: none !important;
  }
</style>

</head>
<body>
<div class="main-wrapper">
{% include "ecom/customer_navbar.html" %}

{% if messages %}
    <script>
        $(document).ready(function() {
            {% for message in messages %}
                Swal.fire({
                    title: "{{ message.tags|capfirst }}!",
                    text: "{{ message }}",
                    icon: "{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% else %}info{% endif %}",
                    confirmButtonColor: '#2F4550',
                    timer: 2500,
                    position: 'center'
                });
            {% endfor %}
        });
    </script>
{% endif %}

<!-- content start-->
{% block content %}

{% endblock content %}
<!-- content end-->
</div>
  {% include "ecom/footer.html" %}
{% block scripts %}
{% endblock %}
<script>
$(document).ready(function(){

function openNav() {
document.getElementById("mySidenav").style.width = "70%";

document.body.style.backgroundColor = "rgba(0,0,0,0.4)";
}

function closeNav() {
document.getElementById("mySidenav").style.width = "0";
document.body.style.backgroundColor = "rgba(0,0,0,0)";
}


});
</script>

</body>
</html>
