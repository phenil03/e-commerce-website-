<style>
#navbar {
    background-color: #32505b;
    color: #F4F4F9;
    padding: 4px 0;
}

.row1 {
    padding-bottom: 0;
    padding-right: 50px;
}

.row2 {
    padding-bottom: 0;
    display: flex;
    align-items: center;
}

.largenav {
    margin-bottom: 0;
}

.navbar-input {
    padding: 12px 20px;
    border-radius: 8px 0 0 8px;
    border: 0 none;
    outline: 0 none;
    font-size: 18px;
    background-color: #f1f2f6;
    color: #32505b;
    width: 100%;
}

.navbar-input::placeholder {
    color: #95a5a6;
    opacity: 1;
}

.navbar-button {
    background-color: #4a6b7a;
    border: none;
    border-radius: 0 8px 8px 0;
    color: #F4F4F9;
    padding: 0 20px;
    height: 50px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s;
}

.navbar-button:hover {
    background-color: #3d5a6a;
}

.cart-button {
    background-color: #4a6b7a;
    padding: 12px 20px;
    text-align: center;
    height: 50px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 16px;
    width: auto;
    min-width: 120px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #F4F4F9 !important;
    text-decoration: none !important;
    border: none;
    outline: none;
    transition: all 0.2s;
}

.cart-button:hover {
    background-color: #3d5a6a;
    transform: translateY(-1px);
}

.cart-svg {
    display: inline-block;
    width: 16px;
    height: 16px;
    vertical-align: middle;
    margin-right: 8px
}

.item-number {
    border-radius: 3px;
    background-color: rgba(0, 0, 0, .1);
    height: 20px;
    padding: 3px 6px;
    font-weight: 500;
    display: inline-block;
    color: #fff;
    line-height: 12px;
    margin-left: 10px;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.item-number.pop {
    transform: scale(1.4);
    background-color: #27ae60;
}

.upper-links {
    display: inline-block;
    padding: 0 11px;
    line-height: 23px;
    font-family: 'Roboto', sans-serif;
    letter-spacing: 0;
    color: inherit;
    border: none;
    outline: none;
    font-size: 12px
}

.dropdown {
    position: relative;
    display: inline-block;
    margin-bottom: 0px
}

.dropdown:hover {
    background-color: #fff
}

.dropdown:hover .links {
    color: #000
}

.dropdown:hover .dropdown-menu {
    display: block
}

.dropdown .dropdown-menu {
    position: absolute;
    top: 100%;
    display: none;
    background-color: #fff;
    color: #333;
    left: 0px;
    border: 0;
    border-radius: 0;
    box-shadow: 0 4px 8px -3px #555454;
    margin: 0;
    padding: 0px
}

.links {
    color: #fff;
    text-decoration: none
}

.links:hover {
    color: #fff;
    text-decoration: none
}

.profile-links {
    font-size: 12px;
    font-family: 'Roboto', sans-serif;
    border-bottom: 1px solid #e9e9e9;
    box-sizing: border-box;
    display: block;
    padding: 0 11px;
    line-height: 23px
}

.profile-li {
    padding-top: 2px
}

.largenav {
    display: none
}

.smallnav {
    display: block
}

.smallsearch {
    margin-left: 15px;
    margin-top: 15px
}

.menu {
    cursor: pointer
}

@media screen and (min-width: 768px) {
    .largenav {
        display: block
    }

    .smallnav {
        display: none
    }

    .smallsearch {
        margin: 0px
    }
}

/* Autocomplete results */
.search-results {
    position: absolute;
    top: 43px;
    left: 15px;
    width: calc(91.66% - 15px);
    background: #fff;
    border: 1px solid #ddd;
    z-index: 1000;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    display: none;
    max-height: 400px;
    overflow-y: auto;
    border-radius: 0 0 8px 8px;
}

.search-item {
    padding: 12px 15px;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    text-decoration: none !important;
    color: #2F4550 !important;
    transition: all 0.2s;
}

.search-item:last-child { border-bottom: none; }

.search-item:hover {
    background: #f8f9fa;
}

.search-item img {
    width: 45px;
    height: 45px;
    object-fit: cover;
    border-radius: 6px;
    margin-right: 15px;
    border: 1px solid #eee;
}

.search-item-info b {
    display: block;
    font-size: 14px;
    margin-bottom: 2px;
    color: #2F4550;
}

.search-item-info span {
    font-size: 13px;
    color: #27ae60;
    font-weight: 700;
}
</style>

<div id="navbar">
    <div class="container">
        <div class="row row1">
            <ul class="largenav pull-right">
              <li class="upper-links dropdown"><a class="links" href="">Login & SignUp</a>
                  <ul class="dropdown-menu">
                      <li class="profile-li"><a class="profile-links" href="/customerlogin">Login</a></li>
                      <li class="profile-li"><a class="profile-links" href="/customersignup">Signup</a></li>
                  </ul>
              </li>

                <li class="upper-links"><a class="links" href="/adminclick">Admin</a></li>
                <li class="upper-links dropdown"><a class="links" href="">More</a>
                    <ul class="dropdown-menu">
                      <li class="profile-li"><a class="profile-links" href="/send-feedback">Send Feedback</a></li>
                        <li class="profile-li"><a class="profile-links" href="/contactus">Contact Us</a></li>
                        <li class="profile-li"><a class="profile-links" href="/aboutus">About Us</a></li>
                    </ul>
                </li>
            </ul>
        </div>
        <div class="row row2">
            <div class="col-sm-3">
                <h1 style="margin:0px; font-weight: 700;"><a style="text-decoration:none; color:white; font-size: 32px;" href="/"><span class="largenav">Ecommerce</span></a></h1>
            </div>


            <div class="navbar-search smallsearch col-sm-7 col-xs-11" style="position:relative;">
              <form action="/search" method="get" style="width: 100%;">
                <div style="display: flex; width: 100%;"> 
                  <input class="navbar-input" type="search" placeholder="Search for Products, Brands and more" name="query" id="query" autocomplete="off">
                  <button class="navbar-button" type="submit">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                      <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="white"></path>
                    </svg>
                  </button>
                </div>
              </form>
              <div id="search-results-container" class="search-results"></div>
            </div>


            <div class="cart1 largenav col-sm-2"> <a class="cart-button" href="/cart"> <svg class="cart-svg " width="16 " height="16 " viewBox="0 0 16 16 ">
                        <path d="M15.32 2.405H4.887C3 2.405 2.46.805 2.46.805L2.257.21C2.208.085 2.083 0 1.946 0H.336C.1 0-.064.24.024.46l.644 1.945L3.11 9.767c.047.137.175.23.32.23h8.418l-.493 1.958H3.768l.002.003c-.017 0-.033-.003-.05-.003-1.06 0-1.92.86-1.92 1.92s.86 1.92 1.92 1.92c.99 0 1.805-.75 1.91-1.712l5.55.076c.12.922.91 1.636 1.867 1.636 1.04 0 1.885-.844 1.885-1.885 0-.866-.584-1.593-1.38-1.814l2.423-8.832c.12-.433-.206-.86-.655-.86 " fill="#fff "></path>
                    </svg> Cart <span class="item-number">{{ product_count_in_cart }}</span> </a> </div>
        </div>
    </div>
</div>

<script>
$(document).ready(function(){
    $('#query').on('input', function() {
        let term = $(this).val();
        if (term.length >= 2) {
            $.get('/search-suggestions/', { term: term }, function(data) {
                let container = $('#search-results-container');
                container.empty();
                if (data.length > 0) {
                    data.forEach(item => {
                        container.append(`
                            <a href="/product-detail/${item.id}" class="search-item">
                                <img src="${item.image}" alt="">
                                <div class="search-item-info">
                                    <b>${item.name}</b>
                                    <span>${item.price}</span>
                                </div>
                            </a>
                        `);
                    });
                    container.show();
                } else {
                    container.hide();
                }
            });
        } else {
            $('#search-results-container').hide();
        }
    });

    // Hide results when clicking outside
    $(document).on('click', function(e) {
        if (!$(e.target).closest('.navbar-search').length) {
            $('#search-results-container').hide();
        }
    });
});
</script>
