{% extends 'ecom/customer_base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    .contact-success-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        padding: 40px 20px;
        font-family: 'Outfit', sans-serif;
    }

    .success-card {
        background: #FFFFFF;
        padding: 60px 40px;
        border-radius: 32px;
        box-shadow: 0 20px 40px rgba(47, 69, 80, 0.1);
        max-width: 500px;
        width: 100%;
        text-align: center;
        animation: cardAppear 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes cardAppear {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .icon-wrapper {
        width: 80px;
        height: 80px;
        background: #ECFDF5;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 30px;
    }

    .icon-wrapper i {
        font-size: 36px;
        color: #10B981;
    }

    .success-card h1 {
        color: #2F4550;
        font-weight: 700;
        font-size: 28px;
        margin-bottom: 15px;
    }

    .success-card p {
        color: #586F7C;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 40px;
    }

    .btn-home {
        background: linear-gradient(135deg, #2F4550, #586F7C);
        color: #FFFFFF !important;
        padding: 16px 40px;
        border-radius: 14px;
        font-weight: 600;
        font-size: 16px;
        text-decoration: none !important;
        display: inline-block;
        transition: all 0.3s ease;
        box-shadow: 0 10px 20px rgba(47, 69, 80, 0.2);
    }

    .btn-home:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 25px rgba(47, 69, 80, 0.3);
    }
</style>

<div class="contact-success-container">
    <div class="success-card">
        <div class="icon-wrapper">
            <i class="fa fa-paper-plane"></i>
        </div>
        <h1>Message Sent Successfully!</h1>
        <p>Thank you for reaching out to us. We have received your message and will get back to you shortly.</p>
        <a href="/" class="btn-home">Back to Home</a>
    </div>
</div>
{% endblock content %}
