{% extends 'ecom/customer_base.html' %}
{% block content %}
<style>
    body {
        background-color: #F4F4F9;
    }
    .cancel-card {
        margin-top: 50px;
        border: none;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    .card-header {
        background: #2F4550;
        color: #F4F4F9;
        text-align: center;
        padding: 20px;
        font-weight: 600;
        font-size: 22px;
        border: none;
    }
    .card-body {
        padding: 30px;
        background: #fff;
    }
    .form-label {
        color: #2F4550;
        font-weight: 600;
        margin-bottom: 15px;
        font-size: 16px;
    }
    .form-control {
        border: 2px solid #B8DBD9;
        border-radius: 8px;
        padding: 12px;
        font-size: 15px;
        transition: border-color 0.3s;
    }
    .form-control:focus {
        border-color: #586F7C;
        box-shadow: none;
    }
    .btn-cancel-submit {
        background-color: #2F4550;
        color: #F4F4F9;
        border: none;
        border-radius: 8px;
        padding: 12px 25px;
        font-weight: 600;
        width: 100%;
        margin-top: 20px;
        transition: background-color 0.3s;
    }
    .btn-cancel-submit:hover {
        background-color: #586F7C;
        color: #fff;
    }
    .back-to-orders {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: #586F7C;
        text-decoration: none;
        font-weight: 500;
    }
    .back-to-orders:hover {
        color: #2F4550;
        text-decoration: underline;
    }
    .order-summary {
        background-color: #F4F4F9;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 25px;
        border-left: 5px solid #2F4550;
    }
    .order-summary-title {
        color: #2F4550;
        font-size: 14px;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 5px;
    }
    .order-summary-info {
        color: #586F7C;
        font-size: 16px;
    }
</style>

<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card cancel-card">
                <div class="card-header">
                    Cancel Your Order
                </div>
                <div class="card-body">
                    <div class="order-summary">
                        <div class="order-summary-title">Order Items</div>
                        <div class="order-summary-info">
                            {% for item in order.items.all %}
                                {{ item.product.name }}{% if not forloop.last %}, {% endif %}
                            {% endfor %}
                        </div>
                        <div class="order-summary-title" style="margin-top: 10px;">Status</div>
                        <div class="order-summary-info">{{ order.status }}</div>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <label class="form-label" for="reason">Why are you cancelling this order?</label>
                            <textarea class="form-control" name="reason" id="reason" rows="4" placeholder="Please provide a reason..." required></textarea>
                        </div>
                        <button type="submit" class="btn-cancel-submit">
                            Confirm Cancellation
                        </button>
                    </form>
                    <a href="{% url 'my-order' %}" class="back-to-orders">
                        <i class="fa fa-arrow-left"></i> Keep my order
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
